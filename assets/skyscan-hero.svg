<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SkyScan animated banner">
  <defs>
    <linearGradient id="sky" x1="120" y1="20" x2="1080" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="45%" stop-color="#0b2742"/>
      <stop offset="100%" stop-color="#08101a"/>
      <animate attributeName="x1" values="120;260;120" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1080;920;1080" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="beam" x1="320" y1="40" x2="880" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#46f2c2" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#46f2c2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#46f2c2" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2cf3ff"/>
      <stop offset="50%" stop-color="#46f2c2"/>
      <stop offset="100%" stop-color="#f7b500"/>
      <animate attributeName="x1" values="0;180;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1200;1020;1200" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#sky)"/>

  <g opacity="0.4">
    <circle cx="110" cy="72" r="2.5" fill="#c8f6ff"/>
    <circle cx="200" cy="40" r="1.8" fill="#c8f6ff"/>
    <circle cx="980" cy="58" r="2.2" fill="#c8f6ff"/>
    <circle cx="1088" cy="96" r="1.6" fill="#c8f6ff"/>
    <circle cx="860" cy="30" r="1.9" fill="#c8f6ff"/>
    <circle cx="540" cy="34" r="1.8" fill="#c8f6ff"/>
  </g>

  <path d="M80 232C188 176 280 176 392 232C486 280 566 280 660 232C760 180 860 176 972 230C1040 262 1108 270 1140 262"
        stroke="url(#beam)" stroke-width="18" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <animate attributeName="d"
             dur="6s"
             repeatCount="indefinite"
             values="M80 232C188 176 280 176 392 232C486 280 566 280 660 232C760 180 860 176 972 230C1040 262 1108 270 1140 262;M80 234C188 198 286 164 388 214C482 262 566 270 660 226C760 186 862 168 972 216C1048 252 1110 258 1140 252;M80 232C188 176 280 176 392 232C486 280 566 280 660 232C760 180 860 176 972 230C1040 262 1108 270 1140 262"/>
  </path>

  <g transform="translate(0 12)">
    <path d="M514 150L582 118L650 150L582 182Z" fill="#0e233a" stroke="url(#accent)" stroke-width="3" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0 12;0 6;0 12" dur="3.2s" repeatCount="indefinite"/>
    </path>
    <circle cx="582" cy="150" r="18" fill="#09111a" stroke="#46f2c2" stroke-width="3" filter="url(#glow)">
      <animate attributeName="r" values="18;21;18" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M582 92V66M582 204V230M446 150H420M744 150H770" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.95">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <circle cx="582" cy="150" r="4" fill="#d9fffb">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <text x="96" y="110" fill="#f4fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="1.5">SkyScan</text>
    <text x="98" y="150" fill="#9db7cd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="500" letter-spacing="0.3">Autonomous mission stack for PX4 and Gazebo</text>
    <path d="M98 173H392" stroke="url(#accent)" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 304;304 0;0 304" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity="0.9">
    <rect x="98" y="208" width="122" height="40" rx="20" fill="#10263d" stroke="#2cf3ff" stroke-opacity="0.35"/>
    <rect x="230" y="208" width="136" height="40" rx="20" fill="#10263d" stroke="#46f2c2" stroke-opacity="0.35"/>
    <rect x="376" y="208" width="118" height="40" rx="20" fill="#10263d" stroke="#f7b500" stroke-opacity="0.35"/>
    <text x="119" y="234" fill="#dcecff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Takeoff</text>
    <text x="248" y="234" fill="#dcecff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Scan</text>
    <text x="398" y="234" fill="#dcecff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Return</text>
  </g>

  <g transform="translate(0 0)" opacity="0.9">
    <path d="M940 86L998 86" stroke="#2cf3ff" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" values="0;14" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <path d="M912 120L1032 120" stroke="#46f2c2" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;14" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M952 154L1004 154" stroke="#f7b500" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 10">
      <animate attributeName="stroke-dashoffset" values="0;14" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>